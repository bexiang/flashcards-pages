<body>
    <!-- 微信顶部导航 -->
    <div class="weui-navbar">
        <div class="weui-navbar__title">英语学习闪卡-八下U5-20260320</div>

    <!-- 主内容区域 -->
    <div class="weui-tab">
        <div class="weui-tab__panel">
            <!-- 学习页面 -->
            <div id="study-tab" class="tab-content active">
                <div class="page">
                    <div class="metadata-info">
                        年级: 八下U5 | 日期: 20260320
                    </div>
                    
                    <div class="page-title">🐱 跳跳学习模式</div>
                    
                    <div class="progress-container">
                        <div class="progress-text">
                            <span>学习进度</span>
                            <span id="progress-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress" id="progress"></div>
                        </div>
                    </div>
                    
                    <div class="card-container">
                        <div class="card" id="card">
                            <div class="card-face card-front">
                                <div class="card-content" id="chinese-text">加载中...</div>
                                <div class="card-note">点击卡片查看英文</div>

                            <div class="card-face card-back">

                    <!-- 导航按钮 -->
                    <div class="btn-group" style="margin-top: 20px; justify-content: center;">
                        <button class="btn btn-secondary" id="prev-btn" style="font-size: 16px; padding: 12px 20px; margin: 0 5px;">🐾 上一条</button>
                        <button class="btn btn-secondary" id="next-btn" style="font-size: 16px; padding: 12px 20px; margin: 0 5px;">下一条 🐾</button>
                    </div>
                    
                    <!-- 控制按钮 -->
                    <div class="btn-group" style="margin-top: 20px;">
                        <button class="btn btn-primary" id="reset-btn" disabled>🐱 重新开始</button>
                        <button class="btn btn-warning" id="mode-toggle-btn">😿 切换到错题本模式</button>
                    </div>
                </div>
                
                <div class="page" style="margin-top: 15px;">
                    <div class="page-title">🐾 学习统计</div>
                    <div class="stats-container">
                        <div class="stat-item">
                            <div class="stat-value" id="total-cards">0</div>
                            <div class="stat-label">总卡片数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="current-card">0</div>
                            <div class="stat-label">当前卡片</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="learned-cards">0</div>
                            <div class="stat-label">已学习</div>
                        </div>
                    </div>
                    
                    <div class="stats-container">
                        <div class="stat-item">
                            <div class="stat-value" id="familiar-cards" style="color: #07C160;">0</div>
                            <div class="stat-label">已熟悉</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="unfamiliar-cards" style="color: #ff6b6b;">0</div>
                            <div class="stat-label">需复习</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="mode-indicator">全部</div>
                            <div class="stat-label">当前模式</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部标签栏 -->
        <div class="weui-tabbar">
            <div class="weui-tabbar__item weui-bar__item_on">
                <div class="weui-tabbar__icon">
                    <span style="font-size: 24px;">🐱</span>
                </div>
                <div class="weui-tabbar__label">猫咪学习</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const card = document.getElementById('card');
            const englishText = document.getElementById('english-text');
            const chineseText = document.getElementById('chinese-text');
            // 移除上一张/下一张按钮的引用
            const resetBtn = document.getElementById('reset-btn');
            const familiarBtn = document.getElementById('familiar-btn');
            const unfamiliarBtn = document.getElementById('unfamiliar-btn');
            const modeToggleBtn = document.getElementById('mode-toggle-btn');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const progressBar = document.getElementById('progress');
            const progressPercent = document.getElementById('progress-percent');
            const totalCardsSpan = document.getElementById('total-cards');
            const currentCardSpan = document.getElementById('current-card');
            const learnedCardsSpan = document.getElementById('learned-cards');
            const familiarCardsSpan = document.getElementById('familiar-cards');
            const unfamiliarCardsSpan = document.getElementById('unfamiliar-cards');
            const modeIndicatorSpan = document.getElementById('mode-indicator');
            
            // 闪卡数据 - 由Python脚本动态生成
            const flashcards = [
        { english: "an exchange student", chinese: "1. 一名交换生" },
        { english: "look at a display board", chinese: "2. 看展示板" },
        { english: "Don't wear open-toed shoes in the lab.", chinese: "3. 不要在实验室穿露趾鞋。" },
        { english: "Never leave rubbish on the floor.", chinese: "4. 永远不要把垃圾留在地板上。" },
        { english: "No food or drinks in the lab.", chinese: "5. 实验室内禁止饮食。" },
        { english: "Always wear safety gloves when working in the lab.", chinese: "6. 在实验室工作时始终佩戴安全手套。" },
        { english: "Always throw broken glass into the broken glass container.", chinese: "7. 始终把碎玻璃扔进碎玻璃容器。" },
        { english: "Are you ready to do sth?", chinese: "8. 你准备好做某事了吗？" },
        { english: "do some experiments", chinese: "9. 做一些实验" },
        { english: "close-toed shoes", chinese: "10. 不露趾的鞋/包脚趾的鞋" },
        { english: "Before we get started,", chinese: "11. 在我们开始之前，" },
        { english: "What rules must we follow in the lab?", chinese: "12. 在实验室我们必须遵守什么规则？" },
        { english: "Always wear safety gloves when working.", chinese: "13. 工作时始终佩戴安全手套。" },
        { english: "Anything else?", chinese: "14. 还有别的吗？" },
        { english: "You must keep quiet in the reading room.", chinese: "15. 你必须在阅览室里保持安静。" },
        { english: "Keep doing exercise, and you can stay healthy.", chinese: "16. 坚持锻炼，你就能保持健康。" },
        { english: "Take care of the trees to make them grow big and strong.", chinese: "17. 爱护树木，让它们长得又高又壮。" },
        { english: "is sharing a rule story with sb", chinese: "18. 正在和某人分享一个关于规则的故事" },
        { english: "look unhappy", chinese: "19. 看起来不高兴" },
        { english: "talk about rules in class.", chinese: "20. 在课堂上讨论规则。" },
        { english: "School will be a better place without any rules.", chinese: "21. 没有规则，学校会是一个更好的地方。" },
        { english: "shouts happily", chinese: "22. 高兴地喊道" },
        { english: "turn to show his model plane", chinese: "23. 转身展示他的飞机模型" },
        { english: "no one pays any attention to him.", chinese: "24. 没有人注意到他。" },
        { english: "I'm trying to tell you something.", chinese: "25. 我正想告诉你一些事。" },
        { english: "May I have a turn?", chinese: "26. 能轮到我了吗？" },
        { english: "At lunchtime", chinese: "27. 在午餐时间" },
        { english: "without asking", chinese: "28. 未经询问/未经允许" },
        { english: "cry out", chinese: "29. 大喊/哭喊" },
        { english: "What's happening today?", chinese: "30. 今天发生了什么？" },
        { english: "listens to me", chinese: "31. 听我说/听我的话" },
        { english: "no one lets me play", chinese: "32. 没人让我一起玩" },
        { english: "story review", chinese: "33. 故事回顾" },
        { english: "The story shows us that rules are very important.", chinese: "34. 这个故事向我们展示了规则非常重要。" },
        { english: "They help us behave well, stay safe and be happy.", chinese: "35. 它们帮助我们行为得体、保持安全、获得快乐。" }
    ];
            
            let currentCardIndex = 0;
            let learnedCards = new Set();
            let familiarCards = new Set();
            let unfamiliarCards = new Set();
            let isMistakeMode = false;
            let currentFlashcards = [...flashcards]; // 当前显示的卡片列表
            
            // 更新卡片内容
            function updateCard() {
                if (currentFlashcards.length === 0) {
                    return;
                }
                
                englishText.textContent = currentFlashcards[currentCardIndex].english;
                chineseText.textContent = currentFlashcards[currentCardIndex].chinese;
                currentCardSpan.textContent = currentCardIndex + 1;
                // 总卡片数始终显示全部卡片的数量，而不是当前模式的卡片数
                totalCardsSpan.textContent = flashcards.length;
                learnedCardsSpan.textContent = learnedCards.size;
                
                // 更新熟悉度统计 - 确保总数正确
                const totalCards = flashcards.length;
                const familiarCount = familiarCards.size;
                const unfamiliarCount = unfamiliarCards.size;
                const unmarkedCount = totalCards - familiarCount - unfamiliarCount;
                
                // 显示熟悉和需复习的数量（需复习 = 不熟悉 + 未标记）
                familiarCardsSpan.textContent = familiarCount;
                unfamiliarCardsSpan.textContent = unfamiliarCount + unmarkedCount;
                
                // 更新模式指示器
                modeIndicatorSpan.textContent = isMistakeMode ? '错题本' : '全部';
                
                // 更新按钮状态
                resetBtn.disabled = currentFlashcards.length === 0;
                // 熟悉/不熟悉按钮始终可用
                familiarBtn.disabled = false;
                unfamiliarBtn.disabled = false;
                // 模式切换按钮始终可用
                modeToggleBtn.disabled = false;
                // 导航按钮状态管理
                prevBtn.disabled = currentCardIndex === 0;
                nextBtn.disabled = currentCardIndex === currentFlashcards.length - 1;
                
                // 更新进度条 - 只计算已完成的卡片，不包含当前卡片
                const progress = (currentCardIndex / currentFlashcards.length) * 100;
                progressBar.style.width = `${progress}%`;
                progressPercent.textContent = `${progress.toFixed(1)}%`;
                
                // 标记为已学习
                learnedCards.add(currentCardIndex);
                learnedCardsSpan.textContent = learnedCards.size;
            }
            
            // 切换学习模式
            function toggleMode() {
                if (isMistakeMode) {
                    // 从错题本模式切换到全部模式
                    isMistakeMode = false;
                    currentFlashcards = [...flashcards];
                    modeToggleBtn.textContent = '😿 切换到错题本模式';
                    modeToggleBtn.className = 'btn btn-warning';
                } else {
                    // 从全部模式切换到错题本模式
                    isMistakeMode = true;
                    currentFlashcards = flashcards.filter((card, index) => unfamiliarCards.has(index));
                    modeToggleBtn.textContent = '🐱 切换到全部模式';
                    modeToggleBtn.className = 'btn btn-primary';
                }
                currentCardIndex = 0;
                learnedCards.clear(); // 清空已学习记录，因为索引会改变
                card.classList.remove('flipped');
                updateCard();
            }
            
            // 进入上一页
            function goToPrevCard() {
                if (currentCardIndex > 0) {
                    currentCardIndex--;
                    card.classList.remove('flipped');
                    updateCard();
                }
            }
            
            // 进入下一页
            function goToNextCard() {
                if (currentCardIndex < currentFlashcards.length - 1) {
                    currentCardIndex++;
                    card.classList.remove('flipped');
                    updateCard();
                } else {
                    // 学习完成，检查是否需要继续学习
                    checkAndHandleCompletion();
                }
            }
            
            // 检查并处理学习完成
            function checkAndHandleCompletion() {
                if (isMistakeMode) {
                    // 错题本模式：检查是否还有需复习的卡片
                    const totalCards = flashcards.length;
                    const familiarCount = familiarCards.size;
                    const unfamiliarCount = unfamiliarCards.size;
                    const unmarkedCount = totalCards - familiarCount - unfamiliarCount;
                    const needReviewCount = unfamiliarCount + unmarkedCount;
                    
                    if (needReviewCount > 0) {
                        // 还有需复习的卡片，重新开始错题本学习
                        const remainingUnfamiliar = flashcards.filter((card, index) => unfamiliarCards.has(index));
                        currentFlashcards = remainingUnfamiliar;
                        currentCardIndex = 0;
                        learnedCards.clear();
                        card.classList.remove('flipped');
                        updateCard();
                        return;
                    }
                }
                // 全部模式或错题本模式中所有卡片都已熟悉，显示完成消息
                showCompletionMessage();
            }
            
            // 显示学习完成消息
            function showCompletionMessage() {
                const totalCards = flashcards.length;
                const familiarCount = familiarCards.size;
                const unfamiliarCount = unfamiliarCards.size;
                const unmarkedCount = totalCards - familiarCount - unfamiliarCount;
                const needReviewCount = unfamiliarCount + unmarkedCount;
                
                if (isMistakeMode) {
                    alert(`🐱🎉 错题本学习完成！

所有不熟悉的卡片都已掌握！
已熟悉: ${familiarCount} 张
需复习: ${needReviewCount} 张
总计: ${totalCards} 张

点击"全部模式"查看所有卡片，或点击"重新开始"重新学习。🐾`);
                } else {
                    alert(`🐱 全部卡片学习完成！
已熟悉: ${familiarCount} 张
需复习: ${needReviewCount} 张
总计: ${totalCards} 张

点击"错题本模式"专注复习不熟悉的卡片，或点击"重新开始"重新学习。🐾`);
                }
            }
            
            // 标记为熟悉
            function markAsFamiliar() {
                if (currentFlashcards.length === 0) return;
                const originalIndex = flashcards.findIndex(card => 
                    card.english === currentFlashcards[currentCardIndex].english && 
                    card.chinese === currentFlashcards[currentCardIndex].chinese
                );
                if (originalIndex !== -1) {
                    familiarCards.add(originalIndex);
                    unfamiliarCards.delete(originalIndex);
                    updateCard();
                    // 自动进入下一页
                    setTimeout(goToNextCard, 500); // 延迟500ms让用户看到反馈
                }
            }
            
            // 标记为不熟悉
            function markAsUnfamiliar() {
                if (currentFlashcards.length === 0) return;
                const originalIndex = flashcards.findIndex(card => 
                    card.english === currentFlashcards[currentCardIndex].english && 
                    card.chinese === currentFlashcards[currentCardIndex].chinese
                );
                if (originalIndex !== -1) {
                    unfamiliarCards.add(originalIndex);
                    familiarCards.delete(originalIndex);
                    updateCard();
                    // 自动进入下一页
                    setTimeout(goToNextCard, 500); // 延迟500ms让用户看到反馈
                }
            }
            
            // 初始更新
            if (flashcards.length > 0) {
                updateCard();
            }
            
            // 卡片点击事件 - 翻转
            card.addEventListener('click', function() {
                if (currentFlashcards.length === 0) return;
                card.classList.toggle('flipped');
            });
            
            // 移除上一张/下一张按钮的事件监听器
            
            // 重新开始按钮
            resetBtn.addEventListener('click', function() {
                currentCardIndex = 0;
                learnedCards.clear();
                familiarCards.clear();
                unfamiliarCards.clear();
                card.classList.remove('flipped');
                // 重置为全部模式
                isMistakeMode = false;
                currentFlashcards = [...flashcards];
                modeToggleBtn.textContent = '😿 切换到错题本模式';
                modeToggleBtn.className = 'btn btn-warning';
                updateCard();
            });
            
            // 移除随机排序按钮的事件监听器
            
            // 熟悉按钮
            familiarBtn.addEventListener('click', function() {
                markAsFamiliar();
            });
            
            // 不熟悉按钮
            unfamiliarBtn.addEventListener('click', function() {
                markAsUnfamiliar();
            });
            
            // 模式切换按钮
            modeToggleBtn.addEventListener('click', function() {
                toggleMode();
            });
            
            // 导航按钮事件监听器
            prevBtn.addEventListener('click', function() {
                goToPrevCard();
            });
            
            nextBtn.addEventListener('click', function() {
                goToNextCard();
            });
            
            // 移除触摸滑动支持，因为现在使用自动进入下一页模式
        });
    </script>
</body>
</html>
